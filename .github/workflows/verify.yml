name: Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: Verify React ${{ matrix.react.label }}
    strategy:
      fail-fast: false
      matrix:
        react:
          - label: 18
            react-version: 18.3.1
            react-dom-version: 18.3.1
            types-react-version: 18.3.30
            types-react-dom-version: 18.3.7
          - label: 19
            react-version: 19.2.0
            react-dom-version: 19.2.0
            types-react-version: 19.2.6
            types-react-dom-version: 19.2.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Use React ${{ matrix.react.label }}
        run: npm install --package-lock=false --no-save react@${{ matrix.react.react-version }} react-dom@${{ matrix.react.react-dom-version }} @types/react@${{ matrix.react.types-react-version }} @types/react-dom@${{ matrix.react.types-react-dom-version }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run verify
        run: npm run verify
